<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EcoRuta | Crear Punto de Reciclaje</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link rel="stylesheet" href="../css/indexStyles.css" />
</head>

<body>
    <main class="container py-4">
        <h1>Crear Punto de Reciclaje</h1>
                <form id="formulario">
                    <div class="mb-3">
                        <label for="Id" class="form-label">Id</label>
                        <input type="text" class="form-control" id="Id" placeholder="Ejemplo: pr001" />
                    </div>
                    <div class="mb-3">
                        <label for="nombrePunto" class="form-label">Nombre del Punto</label>
                        <input type="text" class="form-control" id="nombrePunto" placeholder="Ejemplo: Punto de Reciclaje Central" />
                    </div>
                    <div class="mb-3">
                        <label for="provincia" class="form-label">Provincia</label>
                        <input type="text" class="form-control" id="provincia" placeholder="Ejemplo: San Jose" />
                    </div>
                    <div class="mb-3">
                        <label for="canton" class="form-label">Canton</label>
                        <input type="text" class="form-control" id="canton" placeholder="Ejemplo: Central" />
                    </div>
                    <div class="mb-3">
                        <label for="direccion" class="form-label">Direccion</label>
                        <input type="text" class="form-control" id="direccion" placeholder="Ejemplo: Calle 123, Barrio Central" />
                    </div>
                    <div class="mb-3">
                        <label for="estado" class="form-label">Estado</label>
                        <select class="form-select" id="estado">
                            <option value="activo">Activo</option>
                            <option value="inactivo">Inactivo</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="telefonoContacto" class="form-label">Telefono de Contacto</label>
                        <input type="text" class="form-control" id="telefonoContacto" placeholder="Ejemplo: 1234-5678" />
                    </div>
                    <div class="mb-3">
                        <label for="materialesPermitidos" class="form-label">Materiales Permitidos</label>
                        <input type="text" class="form-control" id="materialesPermitidos" placeholder="Ejemplo: mat001, mat002" />
                    </div>
                    <div class="mb-3">
                        <label for="horarioAtencion" class="form-label">Horario de Atencion</label>
                        <input type="text" class="form-control" id="horarioAtencion" placeholder="Ejemplo: Lunes a Viernes, 8:00 - 17:00" />
                    </div>
                    <button type="submit" class="btn btn-success">Guardar</button>
                    <a href="./puntosReciclaje.html" class="btn btn-secondary">Cancelar</a>
                </form>
    </main>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

    <script>
        (function () {
            $("#formulario").on("submit", function (e) {
                e.preventDefault();

                const materialesRaw = $("#materialesPermitidos").val();
                const materialesArr = materialesRaw.split(",").map(m => m.trim()).filter(m => m !== "");

                const dato = {
                    Id: $("#Id").val(),
                    nombrePunto: $("#nombrePunto").val(),
                    provincia: $("#provincia").val(),
                    canton: $("#canton").val(),
                    direccion: $("#direccion").val(),
                    estado: $("#estado").val(),
                    telefonoContacto: $("#telefonoContacto").val(),
                    materialesPermitidos: materialesArr,
                    horarioAtencion: $("#horarioAtencion").val(),
                };

                $.ajax({
                    type: "POST",
                    url: "http://localhost:3000/api/puntosReciclaje/",
                    contentType: "application/json",
                    data: JSON.stringify(dato),
                    success: function () {
                        alert("Punto creado correctamente");
                        window.location.href = "./puntosReciclaje.html";
                    },
                    error: function () {
                        alert("Error al crear el punto");
                    },
                });
            });
        })();
    </script>
</body>

</html>
