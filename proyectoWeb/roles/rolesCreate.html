<!doctype html>
<html lang="es">

<head>
    <title>Crear Rol</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
    <main class="container py-4">
        <h1 class="mb-4">Crear Rol</h1>

        <form id="formularioRol">
            <div class="mb-3">
                <label for="Id" class="form-label">Id</label>
                <input type="text" class="form-control" name="Id" id="Id" placeholder="Ejemplo: rol005" required />
            </div>

            <div class="mb-3">
                <label for="nombreRol" class="form-label">Nombre del rol</label>
                <input type="text" class="form-control" name="nombreRol" id="nombreRol"
                    placeholder="Ejemplo: Administrador" required />
            </div>

            <div class="mb-3">
                <label for="descripcion" class="form-label">Descripcion</label>
                <input type="text" class="form-control" name="descripcion" id="descripcion"
                    placeholder="Ejemplo: Gestion completa del sistema" required />
            </div>

            <div class="mb-3">
                <label for="estado" class="form-label">Estado</label>
                <select class="form-select" name="estado" id="estado" required>
                    <option value="">Seleccione una opcion</option>
                    <option value="activo">activo</option>
                    <option value="inactivo">inactivo</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="fechaRegistro" class="form-label">Fecha de registro</label>
                <input type="date" class="form-control" name="fechaRegistro" id="fechaRegistro"
                    placeholder="Seleccione una fecha" required />
            </div>

            <button type="submit" class="btn btn-primary">Guardar</button>
            <button type="reset" class="btn btn-danger">Reset</button>
        </form>
    </main>

    <script>
        $(document).ready(function () {
            $("#formularioRol").submit(function (e) {
                e.preventDefault();

                $.ajax({
                    type: "POST",
                    url: "http://localhost:3000/api/roles/",
                    data: JSON.stringify((function () {
                        let objetodatos = {
                            Id: $("#Id").val(),
                            nombreRol: $("#nombreRol").val(),
                            descripcion: $("#descripcion").val(),
                            estado: $("#estado").val(),
                            fechaRegistro: $("#fechaRegistro").val(),
                        };

                        return objetodatos;
                    })()),
                    contentType: "application/json",
                    dataType: "json",
                    success: function () {
                        alert("Almacenando datos");
                        window.location.href = "./roles.html";
                    },
                    error: function () {
                        alert("Error al guardar los datos");
                    },
                });
            });
        });
    </script>
</body>

</html>
