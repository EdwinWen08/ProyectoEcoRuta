<!doctype html>
<html lang="es">

<head>
    <title>Editar Rol</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
    <main class="container py-4">
        <h1 class="mb-4">Editar Rol</h1>

        <form id="formularioRolEdit">
            <input type="hidden" id="mongoId" />

            <div class="mb-3">
                <label for="Id" class="form-label">Id</label>
                <input type="text" class="form-control" name="Id" id="Id" placeholder="Ejemplo: rol005" required />
            </div>

            <div class="mb-3">
                <label for="nombreRol" class="form-label">Nombre del rol</label>
                <input type="text" class="form-control" name="nombreRol" id="nombreRol"
                    placeholder="Ejemplo: Administrador" required />
            </div>

            <div class="mb-3">
                <label for="descripcion" class="form-label">Descripcion</label>
                <input type="text" class="form-control" name="descripcion" id="descripcion"
                    placeholder="Ejemplo: Gestion completa del sistema" required />
            </div>

            <div class="mb-3">
                <label for="estado" class="form-label">Estado</label>
                <select class="form-select" name="estado" id="estado" required>
                    <option value="">Seleccione una opcion</option>
                    <option value="activo">activo</option>
                    <option value="inactivo">inactivo</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="fechaRegistro" class="form-label">Fecha de registro</label>
                <input type="date" class="form-control" name="fechaRegistro" id="fechaRegistro"
                    placeholder="Seleccione una fecha" required />
            </div>

            <button type="submit" class="btn btn-primary">Guardar cambios</button>
            <a href="./roles.html" class="btn btn-danger">Cancelar</a>
        </form>
    </main>

    <script>
        $(document).ready(function () {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");

            $.get("http://localhost:3000/api/roles/" + id, function (rol) {
                $("#mongoId").val(rol._id);
                $("#Id").val(rol.Id);
                $("#nombreRol").val(rol.nombreRol);
                $("#descripcion").val(rol.descripcion);
                $("#estado").val(rol.estado);
                if (rol.fechaRegistro) {
                    const fecha = new Date(rol.fechaRegistro);
                    const fechaFormateada = fecha.toISOString().split("T")[0];
                    $("#fechaRegistro").val(fechaFormateada);
                }
            }).fail(function () {
                alert("Error al cargar el rol");
                window.location.href = "./roles.html";
            });

            $("#formularioRolEdit").submit(function (e) {
                e.preventDefault();

                let datos = {
                    Id: $("#Id").val(),
                    nombreRol: $("#nombreRol").val(),
                    descripcion: $("#descripcion").val(),
                    estado: $("#estado").val(),
                    fechaRegistro: $("#fechaRegistro").val(),
                };

                $.ajax({
                    type: "PUT",
                    url: "http://localhost:3000/api/roles/" + id,
                    data: JSON.stringify(datos),
                    contentType: "application/json",
                    dataType: "json",
                    success: function () {
                        alert("Rol actualizado");
                        window.location.href = "./roles.html";
                    },
                    error: function () {
                        alert("Error al actualizar los datos");
                    },
                });
            });
        });
    </script>
</body>

</html>
