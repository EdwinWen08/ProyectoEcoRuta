<!doctype html>
<html lang="es">

<head>
    <title>Crear Ruta</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
    <main class="container py-4">
        <h1 class="mb-4">Crear Ruta</h1>

        <form id="formularioRuta">
            <div class="mb-3">
                <label for="Id" class="form-label">Id</label>
                <input type="text" class="form-control" name="Id" id="Id" placeholder="Ejemplo: rut013" required />
            </div>

            <div class="mb-3">
                <label for="nombreRuta" class="form-label">Nombre de la Ruta</label>
                <input type="text" class="form-control" name="nombreRuta" id="nombreRuta"
                    placeholder="Ejemplo: Ruta Metropolitana" required />
            </div>

            <div class="mb-3">
                <label for="puntos" class="form-label">Puntos</label>
                <input type="text" class="form-control" name="puntos" id="puntos" placeholder="Ejemplo: pr001"
                    required />
            </div>

            <div class="mb-3">
                <label for="dia" class="form-label">Dia</label>
                <select class="form-select" name="dia" id="dia" required>
                    <option value="">Seleccione una opcion</option>
                    <option value="Lunes">Lunes</option>
                    <option value="Martes">Martes</option>
                    <option value="Miercoles">Miercoles</option>
                    <option value="Jueves">Jueves</option>
                    <option value="Viernes">Viernes</option>
                    <option value="Sabado">Sabado</option>
                    <option value="Domingo">Domingo</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="horaSalida" class="form-label">Hora de Salida</label>
                <input type="time" class="form-control" name="horaSalida" id="horaSalida"
                    required />
            </div>

            <div class="mb-3">
                <label for="estado" class="form-label">Estado</label>
                <select class="form-select" name="estado" id="estado" required>
                    <option value="">Seleccione una opcion</option>
                    <option value="activa">activa</option>
                    <option value="inactiva">inactiva</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Guardar</button>
            <button type="reset" class="btn btn-danger">Reset</button>
        </form>
    </main>

    <script>
        $(document).ready(function () {
            $("#formularioRuta").submit(function (e) {
                e.preventDefault();

                $.ajax({
                    type: "POST",
                    url: "http://localhost:3000/api/rutas/",
                    data: JSON.stringify((function () {

                        let objetodatos = {
                            Id: $("#Id").val(),
                            nombreRuta: $("#nombreRuta").val(),
                            puntos: $("#puntos").val(),
                            dia: $("#dia").val(),
                            horaSalida: $("#horaSalida").val(),
                            estado: $("#estado").val(),
                        };
                        console.log(objetodatos);
                        return objetodatos;
                    })()),
                    contentType: "application/json",
                    dataType: "json",
                    success: function () {
                        alert("Almacenando datos");
                        window.location.href = "./rutas.html";
                    },
                    error: function () {
                        alert("Error al guardar los datos");
                    },
                });
            });
        });
    </script>
</body>

</html>
