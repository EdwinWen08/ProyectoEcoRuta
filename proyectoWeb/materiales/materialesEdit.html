<!doctype html>
<html lang="es">
  <head>
    <title>Editar Material</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body>
    <main class="container py-4">
      <h1 class="mb-4">Editar Material</h1>

      <form id="formularioMaterialEdit">
        <input type="hidden" id="mongoId" />

            <div class="mb-3">
                <label for="Id" class="form-label">Id</label>
                <input type="text" class="form-control" name="Id" id="Id" placeholder="Ejemplo: mat005" required />
            </div>

            <div class="mb-3">
                <label for="material" class="form-label">Nombre del Material</label>
                <input type="text" class="form-control" name="nombreMaterial" id="nombreMaterial"
                    placeholder="Ejemplo: Plastico PVC" required />
            </div>

            <div class="mb-3">
                <label for="categoria" class="form-label">Categoria</label>
                <input type="text" class="form-control" name="categoria" id="categoria"
                    placeholder="Ejemplo: Plastico" required />
            </div>

            <div class="mb-3">
                <label for="descripcion" class="form-label">Descripcion</label>
                <input type="text" class="form-control" name="descripcion" id="descripcion"
                    placeholder="Ejemplo: Plastico" required />
            </div>

            <div class="mb-3">
                <label for="restricciones" class="form-label">Restricciones</label>
                <input type="text" class="form-control" name="restricciones" id="restricciones"
                    placeholder="Ejemplo: Plastico" required />
            </div>

        <button type="submit" class="btn btn-primary">Guardar cambios</button>
        <a href="./rutas.html" class="btn btn-danger">Cancelar</a>
      </form>
    </main>

    <script>
      $(document).ready(function () {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        $.get("http://localhost:3000/api/materiales/" + id, function (material) {
          $("#mongoId").val(material._id);
          $("#Id").val(material.Id);
          $("#nombreMaterial").val(material.nombreMaterial);
          $("#categoria").val(material.categoria);
          $("#descripcion").val(material.descripcion);
          $("#restricciones").val(material.restricciones);

        }).fail(function () {
          alert("Error al cargar el Material");
          window.location.href = "./materiales.html";
        });

        $("#formularioMaterialEdit").submit(function (e) {
          e.preventDefault();

          let datos = {
                            Id: $("#Id").val(),
                            nombreMaterial: $("#nombreMaterial").val(),
                            categoria: $("#categoria").val(),
                            descripcion: $("#descripcion").val(),
                            restricciones: $("#restricciones").val(),

          };

          $.ajax({
            type: "PUT",
            url: "http://localhost:3000/api/materiales/" + id,
            data: JSON.stringify(datos),
            contentType: "application/json",
            dataType: "json",
            success: function () {
              alert("Material actualizado");
              window.location.href = "./materiales.html";
            },
            error: function () {
              alert("Error al actualizar los datos");
            },
          });
        });
      });
    </script>
  </body>
</html>
