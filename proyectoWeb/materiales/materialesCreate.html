<!doctype html>
<html lang="es">

<head>
    <title>Crear Material</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
    <main class="container py-4">
        <h1 class="mb-4">Crear Material</h1>

        <form id="formularioMaterial">
            <div class="mb-3">
                <label for="Id" class="form-label">Id</label>
                <input type="text" class="form-control" name="Id" id="Id" placeholder="Ejemplo: mat005" required />
            </div>

            <div class="mb-3">
                <label for="material" class="form-label">Nombre del Material</label>
                <input type="text" class="form-control" name="nombreMaterial" id="nombreMaterial"
                    placeholder="Ejemplo: Plastico PVC" required />
            </div>

            <div class="mb-3">
                <label for="categoria" class="form-label">Categoria</label>
                <input type="text" class="form-control" name="categoria" id="categoria"
                    placeholder="Ejemplo: Plastico" required />
            </div>

            <div class="mb-3">
                <label for="descripcion" class="form-label">Descripcion</label>
                <input type="text" class="form-control" name="descripcion" id="descripcion"
                    placeholder="Ejemplo: Plastico" required />
            </div>

            <div class="mb-3">
                <label for="restricciones" class="form-label">Restricciones</label>
                <input type="text" class="form-control" name="restricciones" id="restricciones"
                    placeholder="Ejemplo: Plastico" required />
            </div>


            <button type="submit" class="btn btn-primary">Guardar</button>
            <button type="reset" class="btn btn-danger">Reset</button>
        </form>
    </main>

    <script>
        $(document).ready(function () {
            $("#formularioMaterial").submit(function (e) {
                e.preventDefault();

                $.ajax({
                    type: "POST",
                    url: "http://localhost:3000/api/materiales/",
                    data: JSON.stringify((function () {
                        let objetodatos = {
                            Id: $("#Id").val(),
                            nombreMaterial: $("#nombreMaterial").val(),
                            categoria: $("#categoria").val(),
                            descripcion: $("#descripcion").val(),
                            restricciones: $("#restricciones").val(),
                        };

                        return objetodatos;
                    })()),
                    contentType: "application/json",
                    dataType: "json",
                    success: function () {
                        alert("Almacenando datos");
                        window.location.href = "./materiales.html";
                    },
                    error: function () {
                        alert("Error al guardar los datos");
                    },
                });
            });
        });
    </script>
</body>

</html>
