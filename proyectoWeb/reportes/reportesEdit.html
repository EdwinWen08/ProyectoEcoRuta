<!doctype html>
<html lang="es">

<head>
    <title>Editar Reporte</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
    <main class="container py-4">
        <h1 class="mb-4">Editar Reporte</h1>

        <form id="formularioReporteEdit">
            <input type="hidden" id="mongoId" />

            <div class="mb-3">
                <label for="Id" class="form-label">Id</label>
                <input type="text" class="form-control" name="Id" id="Id" placeholder="Ejemplo: rep001" required />
            </div>

            <div class="mb-3">
                <label for="usuarioId" class="form-label">Usuario Id</label>
                <input type="text" class="form-control" name="usuarioId" id="usuarioId" placeholder="Ejemplo: usr001" required />
            </div>

            <div class="mb-3">
                <label for="puntoId" class="form-label">Punto Id</label>
                <input type="text" class="form-control" name="puntoId" id="puntoId" placeholder="Ejemplo: pr001" required />
            </div>

            <div class="mb-3">
                <label for="descripcion" class="form-label">Descripcion</label>
                <input type="text" class="form-control" name="descripcion" id="descripcion" placeholder="Descripcion del reporte" required />
            </div>

            <div class="mb-3">
                <label for="fechaCreacion" class="form-label">Fecha de creacion</label>
                <input type="date" class="form-control" name="fechaCreacion" id="fechaCreacion" required />
            </div>

            <button type="submit" class="btn btn-primary">Guardar cambios</button>
            <a href="./reportes.html" class="btn btn-danger">Cancelar</a>
        </form>
    </main>

    <script>
        $(document).ready(function () {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");

            $.get("http://localhost:3000/api/reportes/" + id, function (reporte) {
                $("#mongoId").val(reporte._id);
                $("#Id").val(reporte.Id);
                $("#usuarioId").val(reporte.usuarioId);
                $("#puntoId").val(reporte.puntoId);
                $("#descripcion").val(reporte.descripcion);
                if (reporte.fechaCreacion) {
                    const fecha = new Date(reporte.fechaCreacion);
                    const fechaFormateada = fecha.toISOString().split("T")[0];
                    $("#fechaCreacion").val(fechaFormateada);
                }

            }).fail(function () {
                alert("Error al cargar el reporte");
                window.location.href = "./reportes.html";
            });

            $("#formularioReporteEdit").submit(function (e) {
                e.preventDefault();

                let datos = {
                    Id: $("#Id").val(),
                    usuarioId: $("#usuarioId").val(),
                    puntoId: $("#puntoId").val(),
                    descripcion: $("#descripcion").val(),
                    fechaCreacion: $("#fechaCreacion").val(),
                };

                $.ajax({
                    type: "PUT",
                    url: "http://localhost:3000/api/reportes/" + id,
                    data: JSON.stringify(datos),
                    contentType: "application/json",
                    dataType: "json",
                    success: function () {
                        alert("Reporte actualizado");
                        window.location.href = "./reportes.html";
                    },
                    error: function () {
                        alert("Error al actualizar los datos");
                    },
                });
            });
        });
    </script>
</body>

</html>
