<!doctype html>
<html lang="es">

<head>
    <title>Crear Favorito</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
    <main class="container py-4">
        <h1 class="mb-4">Crear Favorito</h1>

        <form id="formularioFavorito">
            <div class="mb-3">
                <label for="Id" class="form-label">Id</label>
                <input type="text" class="form-control" name="Id" id="Id" placeholder="Ejemplo: fav001" required />
            </div>

            <div class="mb-3">
                <label for="usuarioId" class="form-label">Usuario Id</label>
                <input type="text" class="form-control" name="usuarioId" id="usuarioId"
                    placeholder="Ejemplo: usr001" required />
            </div>

            <div class="mb-3">
                <label for="tipo" class="form-label">Tipo</label>
                <input type="text" class="form-control" name="tipo" id="tipo"
                    placeholder="Ejemplo: material" required />
            </div>

            <div class="mb-3">
                <label for="referenciaId" class="form-label">Referencia Id</label>
                <input type="text" class="form-control" name="referenciaId" id="referenciaId"
                    placeholder="Ejemplo: mat001" required />
            </div>

            <div class="mb-3">
                <label for="fechaCreacion" class="form-label">Fecha de Creación</label>
                <input type="date" class="form-control" name="fechaCreacion" id="fechaCreacion" required />
            </div>

            <button type="submit" class="btn btn-primary">Guardar</button>
            <button type="reset" class="btn btn-danger">Reset</button>
        </form>
    </main>

    <script>
        $(document).ready(function () {
            $("#formularioFavorito").submit(function (e) {
                e.preventDefault();

                $.ajax({
                    type: "POST",
                    url: "http://localhost:3000/api/favoritos/",
                    data: JSON.stringify((function () {
                        let objetodatos = {
                            Id: $("#Id").val(),
                            usuarioId: $("#usuarioId").val(),
                            tipo: $("#tipo").val(),
                            referenciaId: $("#referenciaId").val(),
                            fechaCreacion: $("#fechaCreacion").val(),
                        };

                        return objetodatos;
                    })()),
                    contentType: "application/json",
                    dataType: "json",
                    success: function () {
                        alert("Almacenando datos");
                        window.location.href = "./favoritos.html";
                    },
                    error: function () {
                        alert("Error al guardar los datos");
                    },
                });
            });
        });
    </script>
</body>

</html>
