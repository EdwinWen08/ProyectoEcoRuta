<!doctype html>
<html lang="es">

<head>
    <title>Editar Favorito</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
    <main class="container py-4">
        <h1 class="mb-4">Editar Favorito</h1>

        <form id="formularioFavoritoEdit">
            <input type="hidden" id="mongoId" />

            <div class="mb-3">
                <label for="Id" class="form-label">Id</label>
                <input type="text" class="form-control" name="Id" id="Id" placeholder="Ejemplo: fav001" required />
            </div>

            <div class="mb-3">
                <label for="usuarioId" class="form-label">Usuario Id</label>
                <input type="text" class="form-control" name="usuarioId" id="usuarioId"
                    placeholder="Ejemplo: usr001" required />
            </div>

            <div class="mb-3">
                <label for="tipo" class="form-label">Tipo</label>
                <input type="text" class="form-control" name="tipo" id="tipo"
                    placeholder="Ejemplo: material" required />
            </div>

            <div class="mb-3">
                <label for="referenciaId" class="form-label">Referencia Id</label>
                <input type="text" class="form-control" name="referenciaId" id="referenciaId"
                    placeholder="Ejemplo: mat001" required />
            </div>

            <div class="mb-3">
                <label for="fechaCreacion" class="form-label">Fecha de Creación</label>
                <input type="date" class="form-control" name="fechaCreacion" id="fechaCreacion" required />
            </div>

            <button type="submit" class="btn btn-primary">Guardar cambios</button>
            <a href="./favoritos.html" class="btn btn-danger">Cancelar</a>
        </form>
    </main>

    <script>
        $(document).ready(function () {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");

            $.get("http://localhost:3000/api/favoritos/" + id, function (favorito) {
                $("#mongoId").val(favorito._id);
                $("#Id").val(favorito.Id);
                $("#usuarioId").val(favorito.usuarioId);
                $("#tipo").val(favorito.tipo);
                $("#referenciaId").val(favorito.referenciaId);

                if (favorito.fechaCreacion) {
                    const fecha = new Date(favorito.fechaCreacion);
                    const fechaFormateada = fecha.toISOString().split("T")[0];
                    $("#fechaCreacion").val(fechaFormateada);
                }
            }).fail(function () {
                alert("Error al cargar el favorito");
                window.location.href = "./favoritos.html";
            });

            $("#formularioFavoritoEdit").submit(function (e) {
                e.preventDefault();

                let datos = {
                    Id: $("#Id").val(),
                    usuarioId: $("#usuarioId").val(),
                    tipo: $("#tipo").val(),
                    referenciaId: $("#referenciaId").val(),
                    fechaCreacion: $("#fechaCreacion").val(),
                };

                $.ajax({
                    type: "PUT",
                    url: "http://localhost:3000/api/favoritos/" + id,
                    data: JSON.stringify(datos),
                    contentType: "application/json",
                    dataType: "json",
                    success: function () {
                        alert("Favorito actualizado");
                        window.location.href = "./favoritos.html";
                    },
                    error: function () {
                        alert("Error al actualizar los datos");
                    },
                });
            });
        });
    </script>
</body>

</html>
