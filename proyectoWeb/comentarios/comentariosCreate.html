<!doctype html>
<html lang="es">

<head>
    <title>Crear Comentario</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
    <main class="container py-4">
        <h1 class="mb-4">Crear Comentario</h1>

        <form id="formularioComentario">
            <div class="mb-3">
                <label for="Id" class="form-label">Id</label>
                <input type="text" class="form-control" name="Id" id="Id" placeholder="Ejemplo: com001" required />
            </div>

            <div class="mb-3">
                <label for="usuarioId" class="form-label">Usuario Id</label>
                <input type="text" class="form-control" name="usuarioId" id="usuarioId" placeholder="Ejemplo: usr001" required />
            </div>

            <div class="mb-3">
                <label for="tipo" class="form-label">Tipo</label>
                <input type="text" class="form-control" name="tipo" id="tipo" placeholder="Ejemplo: evento" required />
            </div>

            <div class="mb-3">
                <label for="referenciaId" class="form-label">Referencia Id</label>
                <input type="text" class="form-control" name="referenciaId" id="referenciaId" placeholder="Ejemplo: ev001" required />
            </div>

            <div class="mb-3">
                <label for="texto" class="form-label">Texto</label>
                <input type="text" class="form-control" name="texto" id="texto" placeholder="Escribe el comentario" required />
            </div>

            <div class="mb-3">
                <label for="calificacion" class="form-label">Calificacion</label>
                <input type="number" class="form-control" name="calificacion" id="calificacion" placeholder="Ejemplo: 5" required />
            </div>

            <div class="mb-3">
                <label for="fechaCreacion" class="form-label">Fecha de creacion</label>
                <input type="date" class="form-control" name="fechaCreacion" id="fechaCreacion" required />
            </div>

            <button type="submit" class="btn btn-primary">Guardar</button>
            <button type="reset" class="btn btn-danger">Reset</button>
        </form>
    </main>

    <script>
        $(document).ready(function () {
            $("#formularioComentario").submit(function (e) {
                e.preventDefault();

                $.ajax({
                    type: "POST",
                    url: "http://localhost:3000/api/comentarios/",
                    data: JSON.stringify((function () {
                        let objetodatos = {
                            Id: $("#Id").val(),
                            usuarioId: $("#usuarioId").val(),
                            tipo: $("#tipo").val(),
                            referenciaId: $("#referenciaId").val(),
                            texto: $("#texto").val(),
                            calificacion: Number($("#calificacion").val()),
                            fechaCreacion: $("#fechaCreacion").val(),
                        };

                        return objetodatos;
                    })()),
                    contentType: "application/json",
                    dataType: "json",
                    success: function () {
                        alert("Almacenando datos");
                        window.location.href = "./comentarios.html";
                    },
                    error: function () {
                        alert("Error al guardar los datos");
                    },
                });
            });
        });
    </script>
</body>

</html>
