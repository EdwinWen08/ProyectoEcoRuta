<!doctype html>
<html lang="es">

<head>
    <title>Crear Evento</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
    <main class="container py-4">
        <h1 class="mb-4">Crear Evento</h1>

        <form id="formularioEvento">
            <div class="mb-3">
                <label for="Id" class="form-label">Id</label>
                <input type="text" class="form-control" name="Id" id="Id" placeholder="Ejemplo: ev001" required />
            </div>

            <div class="mb-3">
                <label for="nombreTitulo" class="form-label">Titulo</label>
                <input type="text" class="form-control" name="nombreTitulo" id="nombreTitulo" placeholder="Ejemplo: Jornada Verde" required />
            </div>

            <div class="mb-3">
                <label for="descripcion" class="form-label">Descripcion</label>
                <input type="text" class="form-control" name="descripcion" id="descripcion" placeholder="Descripcion del evento" required />
            </div>

            <div class="mb-3">
                <label for="fecha" class="form-label">Fecha</label>
                <input type="text" class="form-control" name="fecha" id="fecha" placeholder="Ejemplo: 2026-04-20" required />
            </div>

            <div class="mb-3">
                <label for="puntoId" class="form-label">Punto Id</label>
                <input type="text" class="form-control" name="puntoId" id="puntoId" placeholder="Ejemplo: pr001" required />
            </div>

            <div class="mb-3">
                <label for="organizadorId" class="form-label">Organizador Id</label>
                <input type="text" class="form-control" name="organizadorId" id="organizadorId" placeholder="Ejemplo: usr001" required />
            </div>

            <div class="mb-3">
                <label for="materialesAceptados" class="form-label">Materiales Aceptados</label>
                <input type="text" class="form-control" name="materialesAceptados" id="materialesAceptados" placeholder="Ejemplo: plastico, vidrio" required />
            </div>

            <div class="mb-3">
                <label for="cupo" class="form-label">Cupo</label>
                <input type="number" class="form-control" name="cupo" id="cupo" placeholder="Ejemplo: 50" required />
            </div>

            <div class="mb-3">
                <label for="ubicacion" class="form-label">Ubicacion</label>
                <input type="text" class="form-control" name="ubicacion" id="ubicacion" placeholder="Ejemplo: Parque Central" required />
            </div>

            <div class="mb-3">
                <label for="fechaCreacion" class="form-label">Fecha de creacion</label>
                <input type="date" class="form-control" name="fechaCreacion" id="fechaCreacion" required />
            </div>

            <div class="mb-3">
                <label for="estado" class="form-label">Estado</label>
                <select class="form-select" name="estado" id="estado" required>
                    <option value="">Seleccione una opcion</option>
                    <option value="activo">activo</option>
                    <option value="inactivo">inactivo</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Guardar</button>
            <button type="reset" class="btn btn-danger">Reset</button>
        </form>
    </main>

    <script>
        $(document).ready(function () {
            $("#formularioEvento").submit(function (e) {
                e.preventDefault();

                $.ajax({
                    type: "POST",
                    url: "http://localhost:3000/api/eventos/",
                    data: JSON.stringify((function () {
                        let materialesRaw = $("#materialesAceptados").val();
                        let materialesArray = materialesRaw.split(",").map(m => m.trim()).filter(m => m !== "");

                        let objetodatos = {
                            Id: $("#Id").val(),
                            nombreTitulo: $("#nombreTitulo").val(),
                            descripcion: $("#descripcion").val(),
                            fecha: $("#fecha").val(),
                            puntoId: $("#puntoId").val(),
                            organizadorId: $("#organizadorId").val(),
                            materialesAceptados: materialesArray,
                            cupo: Number($("#cupo").val()),
                            ubicacion: $("#ubicacion").val(),
                            fechaCreacion: $("#fechaCreacion").val(),
                            estado: $("#estado").val(),
                        };

                        return objetodatos;
                    })()),
                    contentType: "application/json",
                    dataType: "json",
                    success: function () {
                        alert("Almacenando datos");
                        window.location.href = "./eventos.html";
                    },
                    error: function () {
                        alert("Error al guardar los datos");
                    },
                });
            });
        });
    </script>
</body>

</html>
